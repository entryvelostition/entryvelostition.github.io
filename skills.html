<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Навыки — m0rbidmask</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <p class="eyebrow">skills</p>
  <h1 class="page-title">Навыки</h1>
  <p class="page-sub">Направления и инструменты, с которыми работаю.</p>
  <div class="skills-grid" id="skills"></div>
</main>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
buildChrome("skills");

document.getElementById("skills").innerHTML = SKILLS.map(cat=>`
  <div class="skill-cat">
    <div class="skill-cat-head">
      <span class="skill-cat-name">${cat.label}</span>
      <span class="skill-cat-count">${cat.tags.length}</span>
    </div>
    <div class="skill-tags">
      ${cat.tags.map(t=>`<span class="skill-tag">${t}</span>`).join("")}
    </div>
  </div>`).join("");
</script>
</body>
</html>
